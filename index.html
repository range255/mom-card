<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>母亲节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fff;
            color: #ff99bb;
            text-align: center;
            padding: 30px 20px;
            min-height: 100vh;
        }
        /* 信封封面（微信兼容） */
        .envelope {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #ffd6e4;
            display: -webkit-box;
            display: flex;
            -webkit-box-align: center;
            align-items: center;
            -webkit-box-pack: center;
            justify-content: center;
            z-index: 99999;
            cursor: pointer;
            -webkit-transition: all 0.8s ease;
            transition: all 0.8s ease;
        }
        .envelope.hide {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        .envelope-box {
            width: 80vw;
            max-width: 320px;
            height: 400px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            display: -webkit-box;
            display: flex;
            -webkit-box-orient: vertical;
            flex-direction: column;
            -webkit-box-align: center;
            align-items: center;
            -webkit-box-pack: center;
            justify-content: center;
            padding: 20px;
        }
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: #ffb3d9;
            clip-path: polygon(0 0, 50% 50%, 100% 0);
            -webkit-transition: -webkit-transform 0.6s ease;
            transition: transform 0.6s ease;
            -webkit-transform-origin: top center;
            transform-origin: top center;
        }
        .envelope.open .envelope-flap {
            -webkit-transform: rotateX(180deg);
            transform: rotateX(180deg);
        }
        .envelope-text {
            font-size: 26px;
            color: #ff6699;
            font-weight: bold;
            margin-top: 20px;
            z-index: 10;
        }
        .envelope-tip {
            font-size: 14px;
            color: #ff80b3;
            margin-top: 10px;
            opacity: 0.8;
        }
        .heart {
            width: 50px;
            height: 50px;
            background: #ff6699;
            -webkit-transform: rotate(45deg);
            transform: rotate(45deg);
            position: relative;
            margin: 40px 0 20px;
            z-index: 1;
        }
        .heart::before,
        .heart::after {
            content: '';
            width: 50px;
            height: 50px;
            background: #ff6699;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { left: 0; top: -25px; }
        .heart::after { left: -25px; top: 0; }

        /* 贺卡内容样式 */
        .title-img {
            width: 90%;
            max-width: 400px;
            margin: 0 auto 30px;
        }
        .blessing-text {
            font-size: 20px;
            line-height: 2.2;
            color: #ff99bb;
            text-align: left;
            width: 90%;
            max-width: 400px;
            margin: 0 auto 40px;
        }
        .bottom-badge {
            width: 80%;
            max-width: 350px;
            margin: 0 auto;
        }
        .make-btn {
            position: fixed;
            right: 0;
            top: 50%;
            -webkit-transform: translateY(-50%);
            transform: translateY(-50%);
            background: #66b3ff;
            color: white;
            font-size: 18px;
            padding: 15px 10px;
            border-radius: 8px 0 0 8px;
            writing-mode: vertical-rl;
            letter-spacing: 2px;
            z-index: 10;
        }
        .music-btn {
            position: fixed;
            left: 20px;
            top: 20px;
            background: rgba(255,153,187,0.95);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            font-size: 14px;
            z-index: 9999;
        }
    </style>
</head>
<body>

<!-- 信封封面 -->
<div class="envelope" id="envelope">
    <div class="envelope-box">
        <div class="envelope-flap"></div>
        <div class="heart"></div>
        <div class="envelope-text">致 我 最 爱 的 妈 妈</div>
        <div class="envelope-tip">点击信封打开祝福 ✨</div>
    </div>
</div>

<!-- 背景音乐（微信需手动触发） -->
<audio id="bgm" loop>
    <source src="https://music.163.com/song/media/outer/url?id=2128198536.mp3" type="audio/mpeg">


<button class="music-btn" id="musicBtn">音乐</button>

<!-- 顶部卡通标题 -->
<div class="title-img">
    <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ffb3d9;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#ff80b3;stop-opacity:1" />
            </linearGradient>
        </defs>
        <ellipse cx="200" cy="100" rx="180" ry="80" fill="#ffcce0" stroke="#ff99bb" stroke-width="4"/>
        <g transform="translate(60,30)">
            <circle cx="0" cy="0" r="15" fill="#ff99bb"/>
            <circle cx="-12" cy="-10" r="10" fill="#ffb3d9"/>
            <circle cx="12" cy="-10" r="10" fill="#ffb3d9"/>
            <circle cx="0" cy="-15" r="10" fill="#ffb3d9"/>
            <circle cx="-12" cy="10" r="10" fill="#ffb3d9"/>
            <circle cx="12" cy="10" r="10" fill="#ffb3d9"/>
            <rect x="-3" y="15" width="6" height="20" fill="#66cc66"/>
            <ellipse cx="-10" cy="30" rx="8" ry="5" fill="#66cc66" transform="rotate(-30)"/>
            <ellipse cx="10" cy="30" rx="8" ry="5" fill="#66cc66" transform="rotate(30)"/>
        </g>
        <g transform="translate(300,30)">
            <circle cx="0" cy="0" r="15" fill="#ff99bb"/>
            <circle cx="-12" cy="-10" r="10" fill="#ffb3d9"/>
            <circle cx="12" cy="-10" r="10" fill="#ffb3d9"/>
            <circle cx="0" cy="-15" r="10" fill="#ffb3d9"/>
            <circle cx="-12" cy="10" r="10" fill="#ffb3d9"/>
            <circle cx="12" cy="10" r="10" fill="#ffb3d9"/>
            <rect x="-3" y="15" width="6" height="20" fill="#66cc66"/>
            <ellipse cx="-10" cy="30" rx="8" ry="5" fill="#66cc66" transform="rotate(-30)"/>
            <ellipse cx="10" cy="30" rx="8" ry="5" fill="#66cc66" transform="rotate(30)"/>
        </g>
        <circle cx="100" cy="50" r="12" fill="#ff6699"/>
        <circle cx="150" cy="40" r="10" fill="#ff6699"/>
        <circle cx="220" cy="35" r="10" fill="#ff6699"/>
        <circle cx="280" cy="55" r="12" fill="#ff6699"/>
        <polygon points="120,70 125,80 135,80 127,88 130,100 120,93 110,100 113,88 105,80 115,80" fill="#ffdd66"/>
        <polygon points="260,70 265,80 275,80 267,88 270,100 260,93 250,100 253,88 245,80 255,80" fill="#ffdd66"/>
        <text x="200" y="110" text-anchor="middle" font-size="60" font-weight="bold" fill="url(#grad1)" stroke="#ff6699" stroke-width="2" font-family="cursive">母亲节快乐</text>
        <text x="200" y="160" text-anchor="middle" font-size="30" fill="#ff6699" font-weight="bold">LOVE</text>
    </svg>
</div>

<!-- 祝福语 -->
<div class="blessing-text">
    您把青春给了灶台，<br>
    您把时间给了劳累，<br>
    您把欢乐给了家庭，<br>
    您把汗水留给自己，<br>
    您的爱是写不完的爱，<br>
    您的爱是还不尽的爱。<br>
    妈妈，您辛苦了！祝母亲节快乐。
</div>

<!-- 底部徽章 -->
<div class="bottom-badge">
    <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <circle cx="150" cy="150" r="120" fill="#ff6688"/>
        <g transform="translate(150,60)">
            <rect x="-3" y="0" width="6" height="40" fill="#44cc66"/>
            <path d="M0,-20 C-15,0 15,0 0,20 C15,0 -15,0 0,-20" fill="#ff6688"/>
        </g>
        <g transform="translate(90,80)">
            <rect x="-3" y="0" width="6" height="35" fill="#44cc66"/>
            <path d="M0,-15 C-12,0 12,0 0,15 C12,0 -12,0 0,-15" fill="#ff9999"/>
        </g>
        <g transform="translate(210,80)">
            <rect x="-3" y="0" width="6" height="35" fill="#44cc66"/>
            <path d="M0,-15 C-12,0 12,0 0,15 C12,0 -12,0 0,-15" fill="#ff9999"/>
        </g>
        <g transform="translate(60,120)">
            <rect x="-3" y="0" width="6" height="30" fill="#44cc66"/>
            <path d="M0,-12 C-10,0 10,0 0,12 C10,0 -10,0 0,-12" fill="#ffaa66"/>
        </g>
        <g transform="translate(240,120)">
            <rect x="-3" y="0" width="6" height="30" fill="#44cc66"/>
            <path d="M0,-12 C-10,0 10,0 0,12 C10,0 -10,0 0,-12" fill="#ffaa66"/>
        </g>
        <path d="M60,100 Q150,60 240,100" fill="none" stroke="#ffcce0" stroke-width="10"/>
        <text x="150" y="90" text-anchor="middle" font-size="28" fill="white" font-weight="bold">HAPPY</text>
        <text x="150" y="160" text-anchor="middle" font-size="60" fill="white" font-style="italic">Mother's</text>
        <rect x="50" y="170" width="200" height="40" fill="#ff4466" rx="5"/>
        <text x="150" y="195" text-anchor="middle" font-size="24" fill="white" letter-spacing="5px">ROUTERK</text>
        <text x="150" y="240" text-anchor="middle" font-size="40" fill="white" font-weight="bold">DAY</text>
        <g fill="#44cc66">
            <ellipse cx="100" cy="260" rx="10" ry="6"/>
            <ellipse cx="120" cy="270" rx="10" ry="6"/>
            <ellipse cx="140" cy="275" rx="10" ry="6"/>
            <ellipse cx="160" cy="275" rx="10" ry="6"/>
            <ellipse cx="180" cy="270" rx="10" ry="6"/>
            <ellipse cx="200" cy="260" rx="10" ry="6"/>
        </g>
        <g transform="translate(150,260)">
            <circle cx="0" cy="0" r="15" fill="#ff6688"/>
            <circle cx="-12" cy="-8" r="8" fill="#ff88aa"/>
            <circle cx="12" cy="-8" r="8" fill="#ff88aa"/>
            <circle cx="0" cy="-15" r="8" fill="#ff88aa"/>
            <circle cx="-12" cy="8" r="8" fill="#ff88aa"/>
            <circle cx="12" cy="8" r="8" fill="#ff88aa"/>
            <circle cx="0" cy="0" r="5" fill="#ffdd66"/>
        </g>
    </svg>
</div>

<!-- 右侧按钮 -->
<div class="make-btn">我要制作</div>

<script>
    const bgm = document.getElementById('bgm');
    const musicBtn = document.getElementById('musicBtn');
    const envelope = document.getElementById('envelope');
    let isPlay = false;

    // 点击信封打开 + 播放音乐（微信合规）
    envelope.addEventListener('click', function(){
        envelope.classList.add('open');
        setTimeout(()=>{
            envelope.classList.add('hide');
        },600);
        // 微信必须手动触发播放
        if(!isPlay){
            bgm.play().then(()=>{
                isPlay = true;
                musicBtn.innerText = '暂停';
            }).catch(e=>console.log("播放失败:",e));
        }
    });

    // 音乐开关
    musicBtn.onclick = function(){
        if(isPlay){
            bgm.pause();
            musicBtn.innerText = '播放';
            isPlay = false;
        }else{
            bgm.play().then(()=>{
                isPlay = true;
                musicBtn.innerText = '暂停';
            }).catch(e=>console.log("播放失败:",e));
        }
    };
</script>
</body>
</html>
